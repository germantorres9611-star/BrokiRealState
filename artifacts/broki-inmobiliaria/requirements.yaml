packages:
  "framer-motion": "For premium smooth animations, scroll reveals, and expanding cards"
  "react-hook-form": "For robust admin forms"
  "@hookform/resolvers": "For zod validation integration"
  "zod": "For schema validation of form inputs"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"
  "date-fns": "For formatting dates in the admin dashboard"

